name: 🐛 Bug Report
description: Report a broken feature or UI glitch.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### Thanks for reporting a bug! 
        Please provide as much detail as possible so we can squash it efficiently.
  - type: input
    id: version
    attributes:
      label: App Version
      description: Look in Settings or the `.version` file.
      placeholder: e.g., 1.6.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: macOS Version
      options:
        - macOS 14 (Sonoma)
        - macOS 13 (Ventura)
        - macOS 12 (Monterey)
        - macOS 11 (Big Sur)
        - Older / Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we make this happen again?
      placeholder: |
        1. Open Dashboard
        2. Click on '...'
        3. See Error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Terminal / Server Logs
      description: Please paste relevant lines from `server.log` or the console here.
      render: bash
  - type: checkboxes
    id: checks
    attributes:
      label: Validation
      options:
        - label: I have checked the existing issues and this is not a coincidence.
          required: true
        - label: I am using the latest version of the app.
          required: true
