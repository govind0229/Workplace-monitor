name: Build and Release PKG

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: self-hosted
          - arch: arm64
            runner: macos-latest
    
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Read Version from File
        run: echo "VERSION=$(cat .version)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Download Bundled Node.js
        run: bash download_node.sh ./bundled_node ${{ matrix.arch }}

      - name: Build PKG Installer
        env:
          VERSION: ${{ env.VERSION }}
          ARCH: ${{ matrix.arch }}
        run: |
          bash pkg_installer/build_pkg.sh
          bash pkg_installer/build_distribution_pkg.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@50769540e7f4fa5bdcc2699f0c229d3ebeb54a2a
        with:
          name: WorkplaceMonitor-${{ matrix.arch }}
          path: WorkplaceMonitor-${{ matrix.arch }}.pkg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && (needs.build.result == 'success' || needs.build.result == 'failure')
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Download All Artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          path: ./artifacts
          merge-multiple: true
        continue-on-error: true

      - name: Read Version
        run: echo "VERSION=$(cat .version)" >> $GITHUB_ENV

      - name: Calculate SHA256
        id: shasum
        run: |
          if [ -f ./artifacts/WorkplaceMonitor-x64.pkg ]; then
            echo "SHA_X64=$(sha256sum ./artifacts/WorkplaceMonitor-x64.pkg | awk '{print $1}')" >> $GITHUB_ENV
            echo "HAS_X64=true" >> $GITHUB_ENV
          else
            echo "HAS_X64=false" >> $GITHUB_ENV
          fi
          
          if [ -f ./artifacts/WorkplaceMonitor-arm64.pkg ]; then
            echo "SHA_ARM64=$(sha256sum ./artifacts/WorkplaceMonitor-arm64.pkg | awk '{print $1}')" >> $GITHUB_ENV
            echo "HAS_ARM64=true" >> $GITHUB_ENV
          else
            echo "HAS_ARM64=false" >> $GITHUB_ENV
          fi

      - name: Update Homebrew Tap
        env:
          VERSION: ${{ env.VERSION }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          SHA_X64: ${{ env.SHA_X64 }}
          SHA_ARM64: ${{ env.SHA_ARM64 }}
          HAS_X64: ${{ env.HAS_X64 }}
          HAS_ARM64: ${{ env.HAS_ARM64 }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN is missing. Skipping Homebrew tap update."
            exit 0
          fi
          
          if [ "$HAS_ARM64" != "true" ] && [ "$HAS_X64" != "true" ]; then
            echo "No artifacts found to release. Skipping Homebrew update."
            exit 0
          fi

          git clone https://${TAP_GITHUB_TOKEN}@github.com/govind0229/homebrew-tap.git tap-repo
          cd tap-repo
          mkdir -p Casks
          
          generate_cask() {
            local cask_name=$1
            # If an architecture is missing, we use a placeholder or keep old value?
            # For simplicity, if one is missing, we use the other one as fallback or a dummy.
            # Usually users want both, so we'll just use the available ones.
            local final_sha_arm="${SHA_ARM64:-$SHA_X64}"
            local final_sha_intel="${SHA_X64:-$SHA_ARM64}"

            cat > "Casks/${cask_name}.rb" << EOF
          cask "${cask_name}" do
            arch arm: "arm64", intel: "x64"

            version "$VERSION"
            
            sha256 arm:   "$final_sha_arm",
                   intel: "$final_sha_intel"

            url "https://github.com/govind0229/Workplace-monitor/releases/download/v#{version}/WorkplaceMonitor-#{arch}.pkg"
            name "Workplace Monitor"
            desc "Location-based automatic time tracking and monitoring"
            homepage "https://github.com/govind0229/Workplace-monitor"

            pkg "WorkplaceMonitor-#{arch}.pkg"

            uninstall pkgutil: "com.workplacemonitor.app"
          end
          EOF
          }
          
          generate_cask "workinghours"
          generate_cask "workinghours@$VERSION"
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/
          git commit -m "Update workinghours to v$VERSION (multi-arch)" || echo "No changes to commit"
          git push origin main

      - name: Extract Release Notes
        run: |
          sed -n "/^## \[${{ env.VERSION }}\]/,/^## /p" CHANGELOG.md | sed '$d' > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          tag_name: v${{ env.VERSION }}
          name: WorkplaceMonitor v${{ env.VERSION }}
          body_path: release_notes.md
          files: ./artifacts/WorkplaceMonitor-*.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
