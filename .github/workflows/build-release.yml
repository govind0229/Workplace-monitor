name: Build and Release PKG

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read Version from File
        run: echo "VERSION=$(cat .version)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Download Bundled Node.js
        run: bash download_node.sh ./bundled_node

      - name: Build PKG Installer
        env:
          VERSION: ${{ env.VERSION }}
        run: bash pkg_installer/build_pkg.sh

      - name: Update Homebrew Tap
        env:
          VERSION: ${{ env.VERSION }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN is missing. Skipping Homebrew tap update."
            exit 0
          fi
          
          SHA256=$(shasum -a 256 WorkingHours.pkg | awk '{print $1}')
          
          git clone https://${TAP_GITHUB_TOKEN}@github.com/govind0229/homebrew-tap.git tap-repo
          cd tap-repo
          mkdir -p Casks
          
          generate_cask() {
            cat > "Casks/${1}.rb" << EOF
          cask "${1}" do
            version "$VERSION"
            sha256 "$SHA256"

            url "https://github.com/govind0229/Workplace-monitor/releases/download/v#{version}/WorkingHours.pkg"
            name "Working Hours Monitor"
            desc "Location-based automatic time tracking and monitoring"
            homepage "https://github.com/govind0229/Workplace-monitor"

            pkg "WorkingHours.pkg"

            uninstall pkgutil: "com.user.workinghours"
          end
          EOF
          }
          
          generate_cask "workinghours"
          generate_cask "workinghours@$VERSION"
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/
          git commit -m "Update workinghours to v$VERSION" || echo "No changes to commit"
          git push origin main

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: WorkingHours v${{ env.VERSION }}
          files: |
            WorkingHours.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
