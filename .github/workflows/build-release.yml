name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
    
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read Version from File
        run: echo "VERSION=$(cat .version)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Download Bundled Node.js
        run: bash download_node.sh ./bundled_node ${{ matrix.arch }}

      - name: Build PKG Installer
        env:
          VERSION: ${{ env.VERSION }}
          ARCH: ${{ matrix.arch }}
        run: |
          bash pkg_installer/build_pkg.sh
          bash pkg_installer/build_distribution_pkg.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkplaceMonitor-${{ matrix.arch }}
          path: WorkplaceMonitor-${{ matrix.arch }}.pkg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore and Build C# Tracker
        run: |
          dotnet publish win_utility/win_utility.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Create Release Zip
        run: |
          powershell -Command "Compress-Archive -Path ./publish/* -DestinationPath ./workplace-monitor-win.zip"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkplaceMonitor-win
          path: workplace-monitor-win.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: always() && (needs.build-macos.result == 'success' || needs.build-windows.result == 'success')
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true
        continue-on-error: true

      - name: Read Version
        run: echo "VERSION=$(cat .version)" >> $GITHUB_ENV

      - name: Create Source Tarball for Homebrew Formula
        run: |
          tar -czf ../workplace-monitor-v${{ env.VERSION }}.tar.gz --exclude='.git' --exclude='node_modules' --exclude='./artifacts' .
          mv ../workplace-monitor-v${{ env.VERSION }}.tar.gz ./artifacts/

      - name: Calculate SHA256 hashes
        id: shasum
        run: |
          # Calculate macOS hashes
          if [ -f ./artifacts/WorkplaceMonitor-x64.pkg ]; then
            echo "SHA_X64=$(sha256sum ./artifacts/WorkplaceMonitor-x64.pkg | awk '{print $1}')" >> $GITHUB_ENV
            echo "HAS_X64=true" >> $GITHUB_ENV
          else
            echo "HAS_X64=false" >> $GITHUB_ENV
          fi
          
          if [ -f ./artifacts/WorkplaceMonitor-arm64.pkg ]; then
            echo "SHA_ARM64=$(sha256sum ./artifacts/WorkplaceMonitor-arm64.pkg | awk '{print $1}')" >> $GITHUB_ENV
            echo "HAS_ARM64=true" >> $GITHUB_ENV
          else
            echo "HAS_ARM64=false" >> $GITHUB_ENV
          fi
          
          # Calculate Windows hash
          if [ -f ./artifacts/WorkplaceMonitor-win.zip ]; then
            echo "SHA_WIN=$(sha256sum ./artifacts/WorkplaceMonitor-win.zip | awk '{print $1}')" >> $GITHUB_ENV
            echo "HAS_WIN=true" >> $GITHUB_ENV
          else
            echo "HAS_WIN=false" >> $GITHUB_ENV
          fi

          # Calculate Source Tarball hash
          if [ -f ./artifacts/workplace-monitor-v${{ env.VERSION }}.tar.gz ]; then
            echo "SHA_SOURCE=$(sha256sum ./artifacts/workplace-monitor-v${{ env.VERSION }}.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
            echo "HAS_SOURCE=true" >> $GITHUB_ENV
          else
            echo "HAS_SOURCE=false" >> $GITHUB_ENV
          fi

      - name: Update Homebrew Tap (Casks and Formula)
        env:
          VERSION: ${{ env.VERSION }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          SHA_X64: ${{ env.SHA_X64 }}
          SHA_ARM64: ${{ env.SHA_ARM64 }}
          SHA_SOURCE: ${{ env.SHA_SOURCE }}
          HAS_X64: ${{ env.HAS_X64 }}
          HAS_ARM64: ${{ env.HAS_ARM64 }}
          HAS_SOURCE: ${{ env.HAS_SOURCE }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN is missing. Skipping Homebrew tap update."
            exit 0
          fi
          
          git clone https://${TAP_GITHUB_TOKEN}@github.com/govind0229/homebrew-tap.git tap-repo
          cd tap-repo
          
          # 1. Update macOS GUI Cask
          if [ "$HAS_ARM64" = "true" ] || [ "$HAS_X64" = "true" ]; then
            mkdir -p Casks
            local_sha_arm="${SHA_ARM64:-$SHA_X64}"
            local_sha_intel="${SHA_X64:-$SHA_ARM64}"
            
            cat > Casks/workinghours.rb << EOF
          cask "workinghours" do
            arch arm: "arm64", intel: "x64"

            version "$VERSION"
            sha256 arm:   "$local_sha_arm",
                   intel: "$local_sha_intel"

            url "https://github.com/govind0229/Workplace-monitor/releases/download/v#{version}/WorkplaceMonitor-#{arch}.pkg"
            name "Workplace Monitor"
            desc "Location-based automatic time tracking and monitoring"
            homepage "https://github.com/govind0229/Workplace-monitor"

            pkg "WorkplaceMonitor-#{arch}.pkg"

            uninstall pkgutil: "com.workplacemonitor.app"
          end
          EOF
          fi

          # 2. Update CLI/WSL Formula
          if [ "$HAS_SOURCE" = "true" ]; then
            mkdir -p Formula
            cat > Formula/workplace-monitor.rb << EOF
          class WorkplaceMonitor < Formula
            desc "Workplace activity tracker and status sync monitor"
            homepage "https://github.com/govind0229/Workplace-monitor"
            url "https://github.com/govind0229/Workplace-monitor/releases/download/v${VERSION}/workplace-monitor-v${VERSION}.tar.gz"
            sha256 "${SHA_SOURCE}"
            license "MIT"

            depends_on "node"

            def install
              libexec.install Dir["*"]
              (bin/"workplace-monitor").write <<~EOS
                #!/bin/bash
                exec "#{Formula["node"].opt_bin}/node" "#{libexec}/server.js" "$@"
              EOS
            end

            service do
              run [opt_bin/"workplace-monitor"]
              keep_alive true
              log_path var/"log/workplace-monitor.log"
              error_log_path var/"log/workplace-monitor.log"
            end
          end
          EOF
          fi
          
          # Commit and Push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/ Formula/
          git commit -m "Update workinghours and workplace-monitor to v$VERSION" || echo "No changes to commit"
          git push origin main

      - name: Extract Release Notes
        run: |
          sed -n "/^## \[${{ env.VERSION }}\]/,/^## /p" CHANGELOG.md | sed '$d' > release_notes.md
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: WorkplaceMonitor v${{ env.VERSION }}
          body_path: release_notes.md
          files: |
            ./artifacts/WorkplaceMonitor-*.pkg
            ./artifacts/WorkplaceMonitor-win.zip
            ./artifacts/workplace-monitor-v*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
