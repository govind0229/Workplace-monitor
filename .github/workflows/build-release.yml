name: Build and Release PKG

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.4.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Download Bundled Node.js
        run: bash download_node.sh ./bundled_node

      - name: Build PKG Installer
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: bash pkg_installer/build_pkg.sh

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: WorkingHours v${{ github.event.inputs.version }}
          files: |
            WorkingHours.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
