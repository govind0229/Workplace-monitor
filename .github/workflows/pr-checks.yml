name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validation & Build Checks
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm install

      - name: Verify `.version` File
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f .version ]; then
            echo "Error: .version file is missing!"
            exit 1
          fi
          VERSION=$(cat .version | tr -d '[:space:]')
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: .version format is invalid (should be X.X.X)"
            exit 1
          fi
          
          echo "Validating if version v$VERSION is unique and a valid increment..."
          
          # Fetch tags to ensure we can check against them
          git fetch --tags > /dev/null 2>&1

          # 1. Check if EXACT version already exists
          if gh release view "v$VERSION" > /dev/null 2>&1 || git rev-parse "v$VERSION" > /dev/null 2>&1; then
            echo "::error::Version v$VERSION already exists. Please bump the version!"
            exit 1
          fi

          # 2. Validate SemVer Increment (New > Latest)
          LATEST_TAG=$(git describe --tags --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          
          echo "Latest version found: $LATEST_VERSION"
          echo "Proposed version: $VERSION"

          # Parse versions into arrays
          IFS='.' read -r L_MAJOR L_MINOR L_PATCH <<< "$LATEST_VERSION"
          IFS='.' read -r N_MAJOR N_MINOR N_PATCH <<< "$VERSION"

          IS_GREATER=false
          if [ "$N_MAJOR" -gt "$L_MAJOR" ]; then
            IS_GREATER=true
          elif [ "$N_MAJOR" -eq "$L_MAJOR" ]; then
            if [ "$N_MINOR" -gt "$L_MINOR" ]; then
              IS_GREATER=true
            elif [ "$N_MINOR" -eq "$L_MINOR" ]; then
              if [ "$N_PATCH" -gt "$L_PATCH" ]; then
                IS_GREATER=true
              fi
            fi
          fi

          if [ "$IS_GREATER" = false ]; then
            echo "::error::Proposed version $VERSION is not greater than the latest release $LATEST_VERSION. Please provide a higher Major, Minor, or Patch number!"
            exit 1
          fi
          
          echo "Success: Version v$VERSION is a valid increment over $LATEST_VERSION."

      - name: Compile Swift Native App
        run: |
          # Ensure the swift file can be successfully compiled without errors
          swiftc mac_utility.swift -framework WebKit -o /tmp/mac_utility_test
          echo "Swift compilation successful."

      - name: Check Bash Scripts Syntax
        run: |
          # Validates bash files for syntax errors
          for script in pkg_installer/*.sh scripts/*.sh; do
            if [ -f "$script" ]; then
              bash -n "$script"
              echo "Syntax OK: $script"
            fi
          done
